name: Daily KOSPI Screener Update

on:
  schedule:
    # 평일 KST 17:30 (UTC 08:30) — 한국 장 마감 후 30분
    - cron: '30 8 * * 1-5'
    # 일요일 KST 09:00 (UTC 일 00:00) — 백테스트 주 1회 갱신
    - cron: '0 0 * * 0'
  # 수동 실행 (Actions 탭에서 "Run workflow" 버튼)
  workflow_dispatch:
    inputs:
      run_backtest:
        description: '백테스팅도 실행 (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener (평일 + 수동)
        if: github.event.schedule != '0 0 * * 0'
        run: python kospi_screener.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run screener + backtest (일요일 또는 수동 backtest=true)
        if: github.event.schedule == '0 0 * * 0' || github.event.inputs.run_backtest == 'true'
        run: |
          python kospi_screener.py
          python backtest_runner.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 자동 데이터 갱신 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
